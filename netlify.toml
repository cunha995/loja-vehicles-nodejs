[build]
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "https://je-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/contact"
  to = "https://je-backend.onrender.com/contact"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://je-backend.onrender.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/loja/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/master"
  to = "/master.html"
  status = 200

[[redirects]]
  from = "/master/*"
  to = "/master.html"
  status = 200
